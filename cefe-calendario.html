<title>Cefe Calendario</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;background:linear-gradient(135deg,#0f1923,#1a2d3d,#0f2030);font-family:Georgia,serif;color:#e8dcc8;display:flex;flex-direction:column;align-items:center;padding-bottom:90px}
body.night{background:linear-gradient(135deg,#050a0f,#0a1520,#050f18)}
button{font-family:Georgia,serif;-webkit-appearance:none}
#app{width:100%;max-width:480px;display:flex;flex-direction:column;min-height:100vh}
#hdr{padding:14px 18px 10px;border-bottom:1px solid rgba(210,175,120,.2);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(15,25,35,.95);backdrop-filter:blur(10px);z-index:50}
.hl{font-size:9px;letter-spacing:3px;color:#a89070;text-transform:uppercase;margin-bottom:2px}
.hm{font-size:18px;font-weight:bold;color:#f0d9a0}
.hr{display:flex;gap:6px;align-items:center}
.tb{background:rgba(255,255,255,.06);border:1px solid rgba(210,175,120,.2);border-radius:10px;padding:5px 9px;color:#a89070;font-size:10px;cursor:pointer}
.tb.on{background:rgba(212,168,67,.15);border-color:rgba(212,168,67,.4);color:#f0d9a0}
#bd{padding:16px;flex:1}
/* ─── BOTTOM NAV ─── */
#bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(10,18,28,.96);backdrop-filter:blur(12px);border-top:1px solid rgba(210,175,120,.15);display:flex;align-items:stretch;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0 6px;background:none;border:none;cursor:pointer;color:#a89070;min-height:56px;position:relative;text-decoration:none}
.bnav-btn.on{color:#f0d9a0}
.bnav-btn.on::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:linear-gradient(90deg,#d4a843,#f0d9a0);border-radius:0 0 3px 3px}
.bnav-ic{font-size:20px;line-height:1;margin-bottom:3px;display:block}
.bnav-lbl{font-size:9px;letter-spacing:.5px;text-transform:uppercase;font-family:Georgia,serif}
/* ─── CALENDAR GRID ─── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-title{font-size:18px;font-weight:bold;color:#f0d9a0}
.cal-nav{background:rgba(255,255,255,.06);border:1px solid rgba(210,175,120,.2);border-radius:10px;padding:6px 12px;color:#d4a843;cursor:pointer;font-size:16px}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
.cal-dow-cell{text-align:center;font-size:9px;color:#a89070;padding:4px 0;text-transform:uppercase;letter-spacing:1px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:20px}
.cal-cell{min-height:44px;border-radius:10px;padding:4px;cursor:pointer;position:relative;display:flex;flex-direction:column;align-items:center;transition:background .15s}
.cal-cell:active{background:rgba(212,168,67,.2)}
.cal-cell.today{background:rgba(212,168,67,.12);border:1px solid rgba(212,168,67,.3)}
.cal-cell.selected{background:rgba(212,168,67,.25);border:1px solid rgba(212,168,67,.6)}
.cal-cell.other-month{opacity:.35}
.cal-cell.feriado{background:rgba(150,150,150,.08)}
.cal-cell.celebracion-day{background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.25)}
.cal-day-num.golden{background:linear-gradient(135deg,#d4a843,#f0d9a0);color:#0f1923;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;margin:0 auto;font-weight:bold}
.cal-day-num{font-size:13px;font-weight:bold;color:#f0d9a0;line-height:1}
.cal-cell.today .cal-day-num{color:#d4a843}
.cal-cell.other-month .cal-day-num{color:#666}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:3px}
.cal-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
/* ─── EVENT COLORS ─── */
.dot-toma{background:#4a9eff}
.dot-peso{background:#d4a843}
.dot-vacuna{background:#e07070}
.dot-vacuna-ok{background:#64c8b4}
.dot-visita{background:#b48cdc}
.dot-hito{background:#f0d9a0}
.dot-feriado{background:#888}
.dot-nota{background:#64c8b4}
.dot-sintoma{background:#e07070}
/* ─── DAY DETAIL ─── */
.day-detail{background:rgba(255,255,255,.03);border:1px solid rgba(210,175,120,.12);border-radius:16px;padding:14px;margin-bottom:16px}
.day-detail-title{font-size:13px;font-weight:bold;color:#d4a843;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.event-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(210,175,120,.08)}
.event-row:last-child{border-bottom:none}
.event-dot-big{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.event-content{flex:1}
.event-title{font-size:13px;font-weight:bold;color:#f0d9a0;margin-bottom:2px}
.event-sub{font-size:11px;color:#a89070;line-height:1.5}
.event-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.event-btn{padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer;border:none;font-family:Georgia,serif}
.event-btn.confirm{background:rgba(100,200,180,.2);border:1px solid rgba(100,200,180,.4);color:#64c8b4}
.event-btn.gcal{background:rgba(66,133,244,.15);border:1px solid rgba(66,133,244,.3);color:#7ab4f5}
.event-btn.ics{background:rgba(212,168,67,.15);border:1px solid rgba(212,168,67,.3);color:#d4a843}
.event-btn.share{background:rgba(37,211,102,.15);border:1px solid rgba(37,211,102,.3);color:#25d366}
.event-btn.edit{background:rgba(255,255,255,.06);border:1px solid rgba(210,175,120,.2);color:#a89070}
/* ─── LEGEND ─── */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#a89070}
.legend-dot{width:8px;height:8px;border-radius:50%}
/* ─── CARDS ─── */
.card{background:rgba(255,255,255,.04);border:1px solid rgba(210,175,120,.15);border-radius:16px;padding:14px;margin-bottom:12px}
.slbl{font-size:9px;letter-spacing:3px;color:#a89070;text-transform:uppercase;margin-bottom:8px}
.pb{border-radius:12px;padding:12px 18px;font-size:13px;font-weight:bold;cursor:pointer;width:100%;display:block;border:none;margin-bottom:8px}
.pb.go{background:#d4a843;color:#0f1923}
.pb.gr{background:#25d366;color:#fff}
.pb.bl{background:rgba(100,150,220,.8);color:#fff}
.pb.gy{background:#a89070;color:#0f1923}
.gb{background:transparent;border-radius:12px;padding:10px 18px;font-size:12px;cursor:pointer;width:100%;display:block;margin-top:6px;border:1px solid rgba(210,175,120,.2);color:#a89070}
.fi{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(210,175,120,.2);border-radius:10px;padding:10px 12px;color:#e8dcc8;font-family:Georgia,serif;font-size:13px;outline:none}
.fi::placeholder{color:#a89070}
.fs{width:100%;background:rgba(20,30,45,.9);border:1px solid rgba(210,175,120,.2);border-radius:10px;padding:10px 12px;color:#e8dcc8;font-family:Georgia,serif;font-size:13px;outline:none;-webkit-appearance:none}
.ff{margin-bottom:12px}
.fl{font-size:9px;letter-spacing:2px;color:#a89070;text-transform:uppercase;margin-bottom:5px;display:block}
.frow{display:flex;gap:10px;margin-bottom:12px}
.frow .ff{flex:1}
.bk{background:none;border:none;color:#a89070;cursor:pointer;font-size:12px;padding:0 0 12px 0;display:block}
.msgbox{background:rgba(37,211,102,.06);border:1px solid rgba(37,211,102,.25);border-radius:14px;padding:14px;margin-bottom:14px;font-size:12px;line-height:1.75;color:#d4e8d0;white-space:pre-wrap}
.rb{flex:1;border-radius:10px;padding:9px;font-size:12px;cursor:pointer;background:rgba(255,255,255,.05);border:1px solid rgba(210,175,120,.2);color:#a89070;text-align:center}
.rb.on{background:rgba(212,168,67,.2);border-color:rgba(212,168,67,.5);color:#f0d9a0}
.notify-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.notify-chip{padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer;background:rgba(255,255,255,.05);border:1px solid rgba(210,175,120,.2);color:#a89070}
.notify-chip.on{background:rgba(212,168,67,.15);border-color:rgba(212,168,67,.4);color:#d4a843}
.upcoming-row{background:rgba(255,255,255,.03);border:1px solid rgba(210,175,120,.1);border-radius:12px;padding:11px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.upcoming-date{text-align:center;min-width:44px}
.upcoming-day-num{font-size:20px;font-weight:bold;color:#f0d9a0;line-height:1}
.upcoming-day-name{font-size:9px;color:#a89070;text-transform:uppercase}
.upcoming-content{flex:1}
.upcoming-title{font-size:13px;font-weight:bold;color:#f0d9a0;margin-bottom:2px}
.upcoming-sub{font-size:11px;color:#a89070}
</style>
</head>

function getActividadesPorEdad(diasDeVida) {
  var semana = Math.floor(diasDeVida / 7);
  var edad_meses = Math.floor(diasDeVida / 30.4);
  var keys = Object.keys(ACTIVIDADES_CAL).map(Number).sort(function(a,b){return a-b;});
  var best = keys[0];
  for (var i = 0; i < keys.length; i++) {
    if (semana >= keys[i]) best = keys[i];
    else break;
  }
  return ACTIVIDADES_CAL[best];
}

// ─── EVENT AGGREGATION ──────────────────────────────────────
// Returns all events for a given date string 'YYYY-MM-DD'
function getEventosDelDia(dateStr){
  var eventos = [];
  var d = new Date(dateStr + 'T12:00');

  // 1. Feriados
  var feriado = FERIADOS_ARG.find(function(f){return f.f===dateStr;});
  if(feriado) eventos.push({tipo:'feriado',titulo:feriado.n,color:'#888',ic:'🇦🇷'});

  // 2. Tomas del día (resumen)
  var tomasDia = CAL.hist.filter(function(h){
    if(h.type!=='toma')return false;
    return fiso(h.s)===dateStr;
  });
  if(tomasDia.length>0){
    var totalMin=tomasDia.reduce(function(a,b){return a+b.tot;},0);
    eventos.push({tipo:'toma',titulo:tomasDia.length+' toma'+(tomasDia.length>1?'s':''),
      sub:'Total: '+totalMin+' min',color:'#4a9eff',ic:'🍼',datos:{tomas:tomasDia}});
  }

  // 3. Pañales del día (resumen)
  var panalesDia = CAL.hist.filter(function(h){
    if(h.type!=='panal')return false;
    return fiso(h.t)===dateStr;
  });
  if(panalesDia.length>0){
    var cc=panalesDia.filter(function(p){return p.p==='Caca'||p.p==='Mixto';}).length;
    eventos.push({tipo:'panal',titulo:panalesDia.length+' pañal'+(panalesDia.length>1?'es':''),
      sub:'Caca/Mix: '+cc,color:'#64c8b4',ic:'🧷',datos:{panales:panalesDia}});
  }

  // 4. Pesos
  var pesosDia = CAL.pesos.filter(function(p){return fiso(p.t)===dateStr;});
  pesosDia.forEach(function(p){
    eventos.push({tipo:'peso',titulo:gkg(p.g)+' kg',sub:p.n||'Control de peso',color:'#d4a843',ic:'⚖️'});
  });

  // 5. Visitas médicas
  var visitasDia = CAL.visits.filter(function(v){return fiso(v.dt)===dateStr;});
  visitasDia.forEach(function(v){
    var med = CAL.meds[v.mi]||{};
    eventos.push({tipo:'visita',titulo:'Dr/a. '+(med.nom||'')+(med.ape?' '+med.ape:''),
      sub:ft(v.dt)+' — '+(med.esp||'')+(v.mod?' | '+v.mod:''),
      color:'#b48cdc',ic:'🏥',datos:v,med:med});
  });

  // 6. Hitos (vida + desarrollo)
  var hitosDia = CAL.hitos.filter(function(h){
    if(!h.fecha)return false;
    // Accept both ISO date and date string
    var hDate = h.fecha.length>10 ? h.fecha.substring(0,10) : h.fecha;
    return hDate===dateStr;
  });
  hitosDia.forEach(function(hi){
    var def = typeof HITOS_DEF !== 'undefined' ? HITOS_DEF : [];
    var hDef = def.find(function(x){return x.id===hi.id;})||{label:'Hito',ic:'⭐',cat:'desarrollo'};
    var esCelebracion = hDef.celebracion===true;
    eventos.push({
      tipo: esCelebracion ? 'celebracion' : 'hito',
      titulo: (hDef.ic||'⭐')+' '+hDef.label,
      sub: hi.nota||'',
      color: esCelebracion ? '#d4a843' : '#f0d9a0',
      ic: esCelebracion ? '🎉' : '⭐',
      datos:{hito:hi, def:hDef}
    });
  });

  // 7. Síntomas
  var sintomasDia = CAL.sintomas.filter(function(s){return fiso(s.t)===dateStr;});
  sintomasDia.forEach(function(s){
    eventos.push({tipo:'sintoma',titulo:s.tipo+(s.valor?' — '+s.valor:''),sub:s.nota||'',color:'#e07070',ic:'🩺'});
  });

  // 8. Notas del día
  var notaDia = CAL.notas.find(function(n){return n.fecha===dateStr;});
  if(notaDia&&notaDia.texto) eventos.push({tipo:'nota',titulo:'Nota del día',sub:notaDia.texto.substring(0,60),color:'#64c8b4',ic:'📝'});

  // 9. Vacunas proyectadas
  VACUNAS_DEF.forEach(function(v){
    var fecha = getVacunaFecha(v);
    if(fiso(fecha)===dateStr){
      var confirmada = isVacunaConfirmada(v.id);
      eventos.push({tipo:confirmada?'vacuna-ok':'vacuna',
        titulo:v.nombre,sub:v.desc+(confirmada?' — ✅ Aplicada':''),
        color:confirmada?'#64c8b4':'#e07070',ic:'💉',
        datos:{vacuna:v, confirmada:confirmada}});
    }
  });

  // 10. Eventos custom del calendario
  var customDia = CAL.calEventos.filter(function(e){return e.fecha===dateStr&&!e.cancelado;});
  customDia.forEach(function(e){
    eventos.push({tipo:'custom',titulo:e.titulo,sub:e.desc||'',color:'#b48cdc',ic:'📅',datos:e});
  });

  return eventos;
}

// Returns all dates in a month that have events (for dots)
function getEventDatesInMonth(year, month){
  var result = {};
  var daysInMonth = new Date(year, month+1, 0).getDate();

  for(var day=1; day<=daysInMonth; day++){
    var dateStr = year+'-'+p2(month+1)+'-'+p2(day);
    var eventos = getEventosDelDia(dateStr);
    if(eventos.length>0){
      result[dateStr] = eventos.map(function(e){return e.tipo;});
    }
  }
  return result;
}

// ─── ICS GENERATOR ──────────────────────────────────────────
function makeICS(evento,fecha,hora,durMin,titulo,desc,lugar,padres){
  var s2=new Date(fecha+'T'+(hora||'09:00'));
  var e2=new Date(s2.getTime()+(durMin||60)*60000);
  function fmt(d){return d.getFullYear()+p2(d.getMonth()+1)+p2(d.getDate())+'T'+p2(d.getHours())+p2(d.getMinutes())+'00';}
  function esc(s){return (s||'').split(',').join('\\,').split(String.fromCharCode(10)).join('\\n');}
  var uid=Date.now()+'@cefe-app';
  var L=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//CefeApp//Calendario//ES',
    'BEGIN:VEVENT','UID:'+uid,'DTSTART:'+fmt(s2),'DTEND:'+fmt(e2),
    'SUMMARY:'+esc(titulo),'DESCRIPTION:'+esc(desc||'')];
  if(lugar)L.push('LOCATION:'+esc(lugar));
  (padres||[]).forEach(function(p){if(p.email)L.push('ATTENDEE;ROLE=REQ-PARTICIPANT:mailto:'+p.email);});
  L.push('END:VEVENT','END:VCALENDAR');
  var CRLF=String.fromCharCode(13)+String.fromCharCode(10);
  return L.join(CRLF);
}

function downloadICS(ics, filename){
  var blob = new Blob([ics], {type:'text/calendar;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url; a.download=filename||'evento-cefe.ics';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function makeGCalURL(titulo, fecha, hora, durMin, desc, lugar){
  var start = new Date(fecha+'T'+(hora||'09:00'));
  var end = new Date(start.getTime()+(durMin||60)*60000);
  function fmt(d){return d.getFullYear()+p2(d.getMonth()+1)+p2(d.getDate())+'T'+p2(d.getHours())+p2(d.getMinutes())+'00';}
  var url = 'https://calendar.google.com/calendar/render?action=TEMPLATE';
  url += '&text='+encodeURIComponent(titulo);
  url += '&dates='+fmt(start)+'/'+fmt(end);
  if(desc) url += '&details='+encodeURIComponent(desc);
  if(lugar) url += '&location='+encodeURIComponent(lugar);
  return url;
}

function makeShareMsg(titulo,fecha,hora,desc,gcalUrl,lugar,link){
  var NL=String.fromCharCode(10);
  var lines=['📅 *'+titulo+'*','📆 '+flong(fecha)];
  if(hora)lines.push('🕐 '+hora+'hs');
  if(lugar)lines.push('📍 '+lugar);
  if(link)lines.push('🔗 '+link);
  if(desc)lines.push('📝 '+desc);
  lines.push('');
  lines.push('Agendar: '+gcalUrl);
  return lines.join(NL);
}

function prevMonth(){

function confirmVacuna(id){
  if(!CAL.bebe.vacunas)CAL.bebe.vacunas={};

function openEventoForm(preset){
  CAL.editEvento=preset||{fecha:CAL.selectedDate||fiso(new Date()),hora:'09:00',titulo:'',desc:'',lugar:'',link:'',tipo:'custom',modalidad:'presencial',notifs:['1dia']};

function saveEvento(){
  var ev=CAL.editEvento;
  if(!ev.titulo.trim()){alert('Ingresá un título.');return;}
  if(!ev.fecha){alert('Ingresá una fecha.');return;}
  var id=ev.id||Date.now()+'';
  var nuevo={id:id,fecha:ev.fecha,hora:ev.hora,titulo:ev.titulo,desc:ev.desc,lugar:ev.lugar,link:ev.link,tipo:ev.tipo,modalidad:ev.modalidad,notifs:ev.notifs||[],confirmado:true};
  var idx=CAL.calEventos.findIndex(function(e){return e.id===id;});
  if(idx>=0)CAL.calEventos[idx]=nuevo;else CAL.calEventos.push(nuevo);
  saveCalEventos();
  CAL.editEvento=null;
  CAL.selectedDate=nuevo.fecha;
  setStep('mes');
}

function deleteEvento(id){
  if(!confirm('¿Eliminar este evento?'))return;
  CAL.calEventos=CAL.calEventos.filter(function(e){return e.id!==id;});
  saveCalEventos();render();
}

function ap(parent){
  var args=Array.prototype.slice.call(arguments,1);
  args.forEach(function(c){if(c)parent.appendChild(c);});

}

// ─── EVENT DELEGATION ───────────────────────────────────────
document.addEventListener('click',function(ev){
  var t=ev.target;
  while(t&&t!==document.body){
    if(t.dataset&&t.dataset.action){
      var d=t.dataset;
      switch(d.action){
        case 'prevMonth': prevMonth();break;
        case 'nextMonth': nextMonth();break;
        case 'goToday': goToday();break;
        case 'selectDay': selectDay(d.date);break;
        case 'goMes': setStep('mes');break;
        case 'goProximos': setStep('proximos');break;
        case 'goActividades': setStep('actividades');break;
        case 'newEvento': openEventoForm();break;
        case 'saveEvento': saveEvento();break;
        case 'deleteEvento': deleteEvento(d.id);break;
        case 'confirmVacuna': confirmVacuna(d.id);break;
        case 'editModalidad':
          document.querySelectorAll('.rb').forEach(function(b){b.classList.remove('on');});
          t.classList.add('on');
          if(CAL.editEvento)CAL.editEvento.modalidad=d.v;break;
        case 'toggleNotif':
          if(CAL.editEvento){
            var notifs=CAL.editEvento.notifs||[];
            var idx=notifs.indexOf(d.v);
            if(idx>=0)notifs.splice(idx,1);else notifs.push(d.v);
            CAL.editEvento.notifs=notifs;
            t.classList.toggle('on');
          }break;
        case 'goMainApp':
          window.location.href='cefe-lactancia.html';break;
        case 'downloadICS': {
          var ev2=JSON.parse(decodeURIComponent(d.ev||'{}'));
          var ics=makeICS(ev2,ev2.fecha,ev2.hora,60,ev2.titulo,ev2.desc||'',ev2.lugar||'',(CAL.padres||[]).filter(function(p){return p.email;}));
          downloadICS(ics,(ev2.titulo||'evento').replace(/s/g,'_')+'.ics');
        }break;
        case 'openGCal': {
          var ev3=JSON.parse(decodeURIComponent(d.ev||'{}'));
          var url=makeGCalURL(ev3.titulo,ev3.fecha,ev3.hora,60,ev3.desc||'',ev3.lugar||ev3.link||'');
          window.open(url,'_blank');
        }break;
        case 'shareEvento': {
          var ev4=JSON.parse(decodeURIComponent(d.ev||'{}'));
          var gcal=makeGCalURL(ev4.titulo,ev4.fecha,ev4.hora,60,ev4.desc||'',ev4.lugar||ev4.link||'');
          var msg=makeShareMsg(ev4.titulo,ev4.fecha,ev4.hora,ev4.desc||'',gcal,ev4.lugar||'',ev4.link||'');
          shareText(msg);
        }break;
      }
      return;
    }
    t=t.parentElement;
  }
});

// ─── RENDER ─────────────────────────────────────────────────
function render(){
  var bd=document.getElementById('bd');
  if(!bd)return;
  while(bd.firstChild)bd.removeChild(bd.firstChild);

  // Update nav
  ['mes','proximos','actividades'].forEach(function(tab){
    var el=document.getElementById('bn-'+tab);
    if(el)el.className='bnav-btn'+(CAL.step===tab||
      (tab==='mes'&&CAL.step==='eventoForm')?' on':'');
  });

  if(CAL.step==='mes') renderMes(bd);
  else if(CAL.step==='proximos') renderProximos(bd);
  else if(CAL.step==='actividades') renderActividades(bd);
  else if(CAL.step==='eventoForm') renderEventoForm(bd);
}

// ── CALENDAR MONTH VIEW ─────────────────────────────────────
function renderMes(bd){
  var year=CAL.viewYear, month=CAL.viewMonth;
  var today=fiso(new Date());
  var eventDates=getEventDatesInMonth(year,month);

  // Header
  var hdr=mkDiv('cal-header');
  var prev=mkBtn('cal-nav','◀','prevMonth');
  var title=mk('div','cal-title',meses()[month]+' '+year);
  var next=mkBtn('cal-nav','▶','nextMonth');
  var todayBtn=mkBtn('tb','Hoy','goToday');todayBtn.style.marginLeft='8px';
  ap(hdr,prev,title,ap(mkDiv(),next,todayBtn));
  bd.appendChild(hdr);

  // Legend
  var leg=mkDiv('legend');
  var legendItems=[
    {cls:'dot-toma',lbl:'Tomas'},{cls:'dot-vacuna',lbl:'Vacuna'},{cls:'dot-vacuna-ok',lbl:'Aplicada'},
    {cls:'dot-visita',lbl:'Médico'},{cls:'dot-peso',lbl:'Peso'},{cls:'dot-feriado',lbl:'Feriado'},
    {cls:'dot-hito',lbl:'Hito'},{cls:'dot-nota',lbl:'Nota'},
  ];
  legendItems.forEach(function(li){
    var item=mkDiv('legend-item');
    var dot=mkDiv('legend-dot '+li.cls);
    item.appendChild(dot);
    item.appendChild(mk('span','',li.lbl));
    leg.appendChild(item);
  });
  bd.appendChild(leg);

  // Days of week header
  var dow=mkDiv('cal-dow');
  dias_cortos().forEach(function(d){
    dow.appendChild(mk('div','cal-dow-cell',d));
  });
  bd.appendChild(dow);

  // Calendar grid
  var grid=mkDiv('cal-grid');
  var firstDay=new Date(year,month,1).getDay(); // 0=Sun
  var daysInMonth=new Date(year,month+1,0).getDate();
  var prevDays=new Date(year,month,0).getDate();

  // Previous month cells
  for(var i=0;i<firstDay;i++){
    var day=prevDays-firstDay+1+i;
    var pm=month===0?year-1:year, pmm=month===0?11:month-1;
    var dateStr=pm+'-'+p2(pmm+1)+'-'+p2(day);
    var cell=mkDiv('cal-cell other-month');
    cell.appendChild(mk('div','cal-day-num',String(day)));
    cell.dataset.action='selectDay';cell.dataset.date=dateStr;
    grid.appendChild(cell);
  }

  // Current month cells
  for(var d2=1;d2<=daysInMonth;d2++){
    var dateStr2=year+'-'+p2(month+1)+'-'+p2(d2);
    var isToday=dateStr2===today;
    var isSelected=dateStr2===CAL.selectedDate;
    var feriado2=FERIADOS_ARG.find(function(f){return f.f===dateStr2;});
    var cls='cal-cell'+(isToday?' today':'')+(isSelected?' selected':'')+(feriado2?' feriado':'');
    var cell2=mkDiv(cls);
    cell2.appendChild(mk('div','cal-day-num',String(d2)));
    cell2.dataset.action='selectDay';cell2.dataset.date=dateStr2;

    // Event dots — 3 levels
    var tipos=eventDates[dateStr2]||[];
    var hasCelebracion=tipos.indexOf('celebracion')>=0;
    var hasHito=tipos.indexOf('hito')>=0||hasCelebracion;
    var hasImportante=['vacuna','visita','custom'].some(function(t){return tipos.indexOf(t)>=0;});

    // Level 3: Celebration day — golden bg on the day number
    if(hasCelebracion){
      // Mark celebration day cell
      cell2.className += ' celebracion-day';
      var dayNumEl = cell2.firstChild;
      if(dayNumEl) dayNumEl.className += ' golden';
    }
    // Level 2: Hito — star emoji above number
    else if(hasHito){
      var star=mk('div','','⭐','font-size:8px;line-height:1;text-align:center');
      cell2.insertBefore(star,cell2.firstChild);
    }

    if(tipos.length>0){
      var dots=mkDiv('cal-dots');
      var tipoMap={'toma':'dot-toma','panal':'dot-nota','peso':'dot-peso',
        'vacuna':'dot-vacuna','vacuna-ok':'dot-vacuna-ok','visita':'dot-visita',
        'hito':'dot-hito','celebracion':'dot-hito','feriado':'dot-feriado',
        'nota':'dot-nota','sintoma':'dot-sintoma','custom':'dot-visita'};
      var shown={};
      tipos.forEach(function(tipo){
        if(tipo==='toma'||tipo==='panal')return; // skip routine — shown in detail only
        if(shown[tipo])return;shown[tipo]=true;
        var dot=mkDiv('cal-dot '+(tipoMap[tipo]||'dot-nota'));
        if(tipo==='celebracion'||tipo==='hito')dot.style.cssText='width:7px;height:7px;background:#d4a843;border-radius:50%';
        dots.appendChild(dot);
      });
      // Show a small grey dot if there are only routine events
      if(dots.children.length===0&&tipos.length>0){
        var rdot=mkDiv('cal-dot');rdot.style.cssText='width:4px;height:4px;background:rgba(255,255,255,.2);border-radius:50%';
        dots.appendChild(rdot);
      }
      if(dots.children.length>0)cell2.appendChild(dots);
    }
    grid.appendChild(cell2);
  }

  // Fill remaining cells
  var total=firstDay+daysInMonth;
  var remaining=(total%7===0)?0:7-(total%7);
  for(var i2=1;i2<=remaining;i2++){
    var nm2=month===11?year+1:year, nmm2=month===11?0:month+1;
    var dateStr3=nm2+'-'+p2(nmm2+1)+'-'+p2(i2);
    var cell3=mkDiv('cal-cell other-month');
    cell3.appendChild(mk('div','cal-day-num',String(i2)));
    cell3.dataset.action='selectDay';cell3.dataset.date=dateStr3;
    grid.appendChild(cell3);
  }
  bd.appendChild(grid);

  // Selected day detail
  if(CAL.selectedDate){
    var eventos=getEventosDelDia(CAL.selectedDate);
    var detail=mkDiv('day-detail');
    var dtitle=mk('div','day-detail-title',flong(CAL.selectedDate).toUpperCase());
    detail.appendChild(dtitle);

    if(eventos.length===0){
      detail.appendChild(mk('div','','Sin eventos registrados en este día.','font-size:12px;color:#a89070'));
    } else {
      eventos.forEach(function(ev){renderEventoRow(ev, detail);});
    }

    // Add event button
    var addBtn=mkBtn('pb go','+ Agregar evento','newEvento');
    addBtn.style.cssText='margin-top:12px;font-size:13px;padding:10px 14px';
    detail.appendChild(addBtn);
    bd.appendChild(detail);
  } else {
    // Hint
    var hint=mk('div','','Tap en un día para ver el detalle.','font-size:12px;color:#a89070;text-align:center;padding:16px');
    bd.appendChild(hint);
  }
}

function renderEventoRow(ev, container){
  var row=mkDiv('event-row');
  var dot=mkDiv('event-dot-big');dot.style.background=ev.color||'#888';
  var content=mkDiv('event-content');
  ap(content,
    mk('div','event-title',ev.ic+' '+ev.titulo),
    ev.sub?mk('div','event-sub',ev.sub):null
  );

  var actions=mkDiv('event-actions');

  // Vacuna: confirmar si no está aplicada
  if(ev.tipo==='vacuna'&&ev.datos&&ev.datos.vacuna){
    var vac=ev.datos.vacuna;
    var confirmBtn=mkBtn('event-btn confirm','✅ Marcar aplicada','confirmVacuna');
    confirmBtn.dataset.id=vac.id;
    actions.appendChild(confirmBtn);
  }

  // Para eventos agendables (visita, vacuna, custom): Google Cal + ICS + Compartir
  if(['vacuna','vacuna-ok','visita','custom'].indexOf(ev.tipo)>=0){
    var fecha=CAL.selectedDate;
    var hora=ev.datos&&ev.datos.dt?ft(ev.datos.dt):(ev.datos&&ev.datos.hora)||'09:00';
    var lugar='';
    if(ev.tipo==='visita'&&ev.med)lugar=ev.med.dir||'';
    if(ev.datos&&ev.datos.lugar)lugar=ev.datos.lugar;
    if(ev.datos&&ev.datos.link&&!lugar)lugar=ev.datos.link;

    var evData=JSON.stringify({titulo:ev.titulo,fecha:fecha,hora:hora,desc:ev.sub||'',lugar:lugar});
    var evEnc=encodeURIComponent(evData);

    var gcalBtn=mkBtn('event-btn gcal','📅 Google Cal','openGCal');gcalBtn.dataset.ev=evEnc;
    var icsBtn=mkBtn('event-btn ics','📥 .ics','downloadICS');icsBtn.dataset.ev=evEnc;
    var shareBtn=mkBtn('event-btn share','↗️ Compartir','shareEvento');shareBtn.dataset.ev=evEnc;
    ap(actions,gcalBtn,icsBtn,shareBtn);
  }

  // Custom events: edit/delete
  if(ev.tipo==='custom'&&ev.datos&&ev.datos.id){
    var delBtn=mkBtn('event-btn edit','🗑','deleteEvento');delBtn.dataset.id=ev.datos.id;
    actions.appendChild(delBtn);
  }

  if(actions.children.length>0)content.appendChild(actions);
  ap(row,dot,content);
  container.appendChild(row);
}

// ── PRÓXIMOS EVENTOS ─────────────────────────────────────────
function renderProximos(bd){
  bd.appendChild(mk('div','','Próximos eventos','font-size:17px;font-weight:bold;color:#f0d9a0;margin-bottom:16px'));

  var today=new Date(); today.setHours(0,0,0,0);
  var upcoming=[];

  // Next 90 days
  for(var i=0;i<90;i++){
    var d=new Date(today.getTime()+i*86400000);
    var dateStr=fiso(d);
    var eventos=getEventosDelDia(dateStr);
    eventos.forEach(function(ev){
      if(['feriado','toma','panal','nota'].indexOf(ev.tipo)<0||ev.tipo==='feriado'){
        if(ev.tipo!=='toma'&&ev.tipo!=='panal'&&ev.tipo!=='nota')
          upcoming.push({date:d,dateStr:dateStr,ev:ev});
      }
    });
  }

  if(upcoming.length===0){
    bd.appendChild(mk('div','','Sin eventos próximos en los próximos 90 días.','font-size:12px;color:#a89070'));
    return;
  }

  upcoming.slice(0,20).forEach(function(item){
    var row=mkDiv('upcoming-row');
    var dDate=mkDiv('upcoming-date');
    dDate.appendChild(mk('div','upcoming-day-num',String(item.date.getDate())));
    dDate.appendChild(mk('div','upcoming-day-name',dias_cortos()[item.date.getDay()]+' '+meses()[item.date.getMonth()].substring(0,3)));

    var content=mkDiv('upcoming-content');
    var ev=item.ev;
    var dot=mkDiv('cal-dot');dot.style.cssText='background:'+ev.color+';margin-right:6px;display:inline-block;margin-bottom:2px';
    var titleDiv=mkDiv('upcoming-title');titleDiv.appendChild(dot);
    titleDiv.appendChild(document.createTextNode(ev.ic+' '+ev.titulo));
    content.appendChild(titleDiv);
    if(ev.sub)content.appendChild(mk('div','upcoming-sub',ev.sub));

    // Action buttons for upcoming
    if(['vacuna','visita','custom'].indexOf(ev.tipo)>=0){
      var actions=mkDiv('event-actions');actions.style.marginTop='6px';
      var evData=JSON.stringify({titulo:ev.titulo,fecha:item.dateStr,hora:(ev.datos&&ev.datos.hora)||'09:00',desc:ev.sub||'',lugar:(ev.datos&&(ev.datos.lugar||ev.datos.link))||''});
      var evEnc=encodeURIComponent(evData);
      var gcalBtn=mkBtn('event-btn gcal','📅 Google Cal','openGCal');gcalBtn.dataset.ev=evEnc;
      var shareBtn=mkBtn('event-btn share','↗️ Compartir','shareEvento');shareBtn.dataset.ev=evEnc;
      ap(actions,gcalBtn,shareBtn);
      content.appendChild(actions);
    }
    if(ev.tipo==='vacuna'&&ev.datos&&ev.datos.vacuna){
      var actions2=mkDiv('event-actions');actions2.style.marginTop='6px';
      var cb=mkBtn('event-btn confirm','✅ Aplicada','confirmVacuna');cb.dataset.id=ev.datos.vacuna.id;
      actions2.appendChild(cb);content.appendChild(actions2);
    }

    ap(row,dDate,content);
    bd.appendChild(row);
  });

  if(upcoming.length>20){
    bd.appendChild(mk('div','','+'+( upcoming.length-20)+' eventos más en los próximos 90 días.','font-size:11px;color:#a89070;text-align:center;padding:12px'));
  }
}

// ── NUEVO EVENTO FORM ────────────────────────────────────────
function renderEventoForm(bd){
  var ev=CAL.editEvento||{};
  bd.appendChild(mkBtn('bk','← Volver','goMes'));
  bd.appendChild(mk('div','',ev.id?'Editar evento':'Nuevo evento','font-size:17px;font-weight:bold;color:#f0d9a0;margin-bottom:4px'));
  bd.appendChild(mk('div','','Se agregará al calendario de Cefe','font-size:12px;color:#a89070;margin-bottom:16px'));

  function field(lbl,inp){var d=mkDiv('ff');d.appendChild(mk('label','fl',lbl));d.appendChild(inp);return d;}
  function frow2(f1,f2){var r=mkDiv('frow');r.appendChild(f1);r.appendChild(f2);return r;}
  function inp(id,type,ph,val){var i=document.createElement('input');i.className='fi';i.id='ev-'+id;i.type=type||'text';if(ph)i.placeholder=ph;if(val!==undefined)i.value=val;return i;}

  bd.appendChild(field('Título del evento',inp('titulo','text','Ej: Vacuna Pentavalente',ev.titulo||'')));

  var fr1=frow2(
    field('Fecha',inp('fecha','date',null,ev.fecha||fiso(new Date()))),
    field('Hora',inp('hora','time',null,ev.hora||'09:00'))
  );
  bd.appendChild(fr1);

  // Modalidad
  bd.appendChild(mk('label','fl','Modalidad'));
  var modRow=mkDiv();modRow.style.cssText='display:flex;gap:8px;margin-bottom:12px';
  var rbP=mkBtn('rb'+((!ev.modalidad||ev.modalidad==='presencial')?' on':''),'Presencial','editModalidad');rbP.dataset.v='presencial';
  var rbV=mkBtn('rb'+(ev.modalidad==='virtual'?' on':''),'Virtual','editModalidad');rbV.dataset.v='virtual';
  ap(modRow,rbP,rbV);
  bd.appendChild(modRow);

  bd.appendChild(field('Lugar / Dirección (presencial)',inp('lugar','text','Ej: Av. del Libertador 1000',ev.lugar||'')));
  bd.appendChild(field('Link (virtual — Google Meet, Zoom...)',inp('link','url','https://meet.google.com/...',ev.link||'')));
  bd.appendChild(field('Descripción / Notas',inp('desc','text','Motivo, observaciones...',ev.desc||'')));

  // Notificaciones
  bd.appendChild(mk('label','fl','Notificaciones (incluir en .ics)'));
  var notifRow=mkDiv('notify-row');
  var notifOpts=[{v:'1dia',lbl:'1 día antes'},{v:'2hs',lbl:'2 hs antes'},{v:'30min',lbl:'30 min antes'}];
  notifOpts.forEach(function(n){
    var chip=mkBtn('notify-chip'+((ev.notifs||[]).indexOf(n.v)>=0?' on':''),n.lbl,'toggleNotif');
    chip.dataset.v=n.v;
    notifRow.appendChild(chip);
  });
  bd.appendChild(notifRow);

  // Invitar a padres
  if(CAL.padres&&CAL.padres.length>0){
    var padresConEmail=CAL.padres.filter(function(p){return p.email;});
    if(padresConEmail.length>0){
      var padresInfo=mkDiv();
      padresInfo.style.cssText='background:rgba(100,200,180,.06);border:1px solid rgba(100,200,180,.15);border-radius:11px;padding:10px;margin-bottom:12px';
      padresInfo.appendChild(mk('div','fl','Incluir en el .ics como invitados:'));
      padresConEmail.forEach(function(p){
        padresInfo.appendChild(mk('div','','✓ '+(p.apodo||p.nom)+' ('+p.email+')','font-size:12px;color:#64c8b4;margin-bottom:3px'));
      });
      bd.appendChild(padresInfo);
    }
  }

  // Save
  var saveBtn=mkBtn('pb go','Guardar evento','saveEvento');
  saveBtn.addEventListener('click',function(){
    // Read form values before saving
    ['titulo','fecha','hora','lugar','link','desc'].forEach(function(f){
      var el=document.getElementById('ev-'+f);
      if(el)CAL.editEvento[f]=el.value.trim();
    });
  });
  bd.appendChild(saveBtn);

  if(ev.id){
    var delBtn=mkBtn('gb','Eliminar evento','deleteEvento');delBtn.dataset.id=ev.id;
    delBtn.style.color='#e07070';delBtn.style.borderColor='rgba(224,112,112,.3)';
    bd.appendChild(delBtn);
  }

  bd.appendChild(mkBtn('gb','Cancelar','goMes'));
}

// ─── INIT ───────────────────────────────────────────────────
loadLocal();
render();

</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
var cfg={apiKey:"AIzaSyC5iVBZbLlD0a7yVRx4eDg6pOjRKNO28kA",authDomain:"cefe-app.firebaseapp.com",databaseURL:"https://cefe-app-default-rtdb.firebaseio.com",projectId:"cefe-app",storageBucket:"cefe-app.firebasestorage.app",messagingSenderId:"40391677831",appId:"1:40391677831:web:3640958b4450f2cd5ae522"};
var app=initializeApp(cfg);var db=getDatabase(app);
var dot=document.getElementById('sync-dot');
var fbReady=false;
function setDot(c,t){if(dot){dot.style.color=c;dot.title=t||'';}}
function rd(v){if(!v)return null;var d=new Date(v);return isNaN(d)?null:d;}
window.fbSave=function(data){
  if(!fbReady)return;
  setDot('#d4a843','Guardando...');
  set(ref(db,'cefe'),data).then(function(){setDot('#64c8b4','OK');}).catch(function(){setDot('#e07070','Error');});
};
onValue(ref(db,'cefe'),function(snap){
  fbReady=true;
  var data=snap.val();
  if(!data){setDot('#64c8b4','Conectado');render();return;}
  function re(e){if(!e)return null;try{if(e.type==='toma'){var s=rd(e.s);if(!s)return null;e.s=s;e.e=rd(e.e)||new Date(s.getTime()+(e.tot||0)*60000);e.nt=rd(e.nt)||new Date(s.getTime()+180*60000);}if(e.type==='panal'){var t=rd(e.t);if(!t)return null;e.t=t;}}catch(ex){return null;}return e;}
  if(data.hist)CAL.hist=data.hist.map(re).filter(Boolean);
  if(data.pesos)CAL.pesos=data.pesos.map(function(p){if(!p)return null;var t=rd(p.t);if(!t)return null;return{t:t,g:p.g,n:p.n||''};}).filter(Boolean);
  if(data.meds)CAL.meds=data.meds.filter(Boolean);
  if(data.visits)CAL.visits=data.visits.map(function(v){if(!v)return null;var dt=rd(v.dt);if(!dt)return null;return Object.assign({},v,{dt:dt});}).filter(Boolean);
  if(data.bebe&&typeof data.bebe==='object')CAL.bebe=Object.assign({},CAL.bebe,data.bebe);
  if(data.hitos)CAL.hitos=data.hitos.filter(Boolean);
  if(data.notas)CAL.notas=data.notas.filter(Boolean);
  if(data.sintomas)CAL.sintomas=data.sintomas.map(function(s){if(!s)return null;var t=rd(s.t);if(!t)return null;return Object.assign({},s,{t:t});}).filter(Boolean);
  if(data.padres)CAL.padres=data.padres.filter(Boolean);
  // Cal-specific data
  if(data.calEventos)CAL.calEventos=data.calEventos.filter(Boolean);
  setDot('#64c8b4','Sincronizado');
  render();
},function(err){fbReady=true;setDot('#e07070','Error');console.error(err);});
</script>
