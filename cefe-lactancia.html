<style>

<body>
<div id="app">
  <div id="header">
    <div>
      <div class="title-label">Registro Lactancia</div>
      <div class="title-main">Ceferino</div>
    </div>
    <div class="header-right">
      <button class="tab-btn" id="tab-hist" onclick="navTo('history')">Historial</button>
      <button class="tab-btn" id="tab-peso" onclick="navTo('peso')">Peso</button>
      <button class="tab-btn" id="tab-medicos" onclick="navTo('medicos')">Medicos</button>
      <button class="tab-btn" id="tab-resumen" onclick="navTo('resumen')">Resumen</button>
      <div class="moon">🌙</div>
    </div>
  </div>
  <div id="body"></div>
</div>
<script>
var SIDES=["Izquierdo","Derecho","Derecho invertido","Izquierdo invertido","Acostado Izquierda","Acostado Derecha"];
var S={
  step:'home',
  history:[],pesoHistory:[],medicos:[],visitas:[],
  tomaStart:null,lados:[],currentSide:null,sideStart:null,
  extraction:{left:0,right:0},panalTime:null,tomaNote:'',
  historyFilter:null,timerInterval:null,elapsed:0,
  alarmTimer:null,alarmFired:false,alarmNextTime:null,
  pesoGrams:0,
  _summaryMsg:'',_summaryType:'',
  manualMode:false,
  manualDate:'',manualTimeStart:'',manualTimeEnd:'',
  manualLados:[],manualCurrentSide:null,manualCurrentMins:'',
  visitaModalMedico:'',visitaFecha:'',visitaHora:'',visitaModalidad:'presencial',visitaDesc:'',
  medicoForm:{especialidad:'',nombre:'',apellido:'',direccion:'',telefono:'',email:''},
  editMedicoIdx:-1,
};

function loadData(){
  try{
    S.history=JSON.parse(localStorage.getItem('cefe_history')||'[]').map(function(e){
      if(e.type==='toma'){e.start=new Date(e.start);e.end=new Date(e.end);e.nextToma=new Date(e.nextToma);}
      else if(e.type==='panal'){e.time=new Date(e.time);}
      return e;
    });
    S.pesoHistory=JSON.parse(localStorage.getItem('cefe_pesos')||'[]').map(function(e){e.time=new Date(e.time);return e;});
    S.medicos=JSON.parse(localStorage.getItem('cefe_medicos')||'[]');
    S.visitas=JSON.parse(localStorage.getItem('cefe_visitas')||'[]').map(function(e){e.datetime=new Date(e.datetime);return e;});
  }catch(err){S.history=[];S.pesoHistory=[];S.medicos=[];S.visitas=[];}
}
function saveData(){
  localStorage.setItem('cefe_history',JSON.stringify(S.history));
  localStorage.setItem('cefe_pesos',JSON.stringify(S.pesoHistory));
  localStorage.setItem('cefe_medicos',JSON.stringify(S.medicos));
  localStorage.setItem('cefe_visitas',JSON.stringify(S.visitas));
}
loadData();

function fTime(d){return new Date(d).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});}
function fDate(d){return new Date(d).toLocaleDateString('es-AR',{weekday:'short',day:'2-digit',month:'2-digit'});}
function fDateFull(d){return new Date(d).toLocaleDateString('es-AR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});}
function fDT(d){return new Date(d).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}
function addMins(d,m){return new Date(new Date(d).getTime()+m*60000);}
function sameDay(a,b){var da=new Date(a),db=new Date(b);return da.getFullYear()===db.getFullYear()&&da.getMonth()===db.getMonth()&&da.getDate()===db.getDate();}
function gramsToKg(g){return (g/1000).toFixed(3);}
function getDayKey(h){var d=new Date(h.type==='toma'?h.start:h.time);return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();}

// ── MESSAGES ──
function generateMsg(entry,hist){
  if(entry.type==='toma'){
    var lstr=entry.lados.map(function(l){return l.side+' '+l.mins+'min';}).join(' + ');
    var hasExt=entry.extraction.left>0||entry.extraction.right>0;
    var tomasHoy=hist.filter(function(h){return h.type==='toma'&&sameDay(h.start,entry.start);});
    var num=tomasHoy.length+1;
    var obs=entry.totalMins<10?'Toma corta, observar si Cefe queda satisfecho.':entry.totalMins>=20?'Buena duracion de toma.':'Toma normal, seguir observando.';
    var lines=['*Lactancia - Ultima Sesion*','Toma #'+num+' del dia','Inicio: '+fTime(entry.start)+' | Fin: '+fTime(entry.end),'Duracion: '+entry.totalMins+' min','Lados: '+lstr];
    if(hasExt) lines.push('Extraccion: izq '+entry.extraction.left+'ml / der '+entry.extraction.right+'ml');
    lines.push('Proxima toma estimada: ~'+fTime(entry.nextToma));
    lines.push(obs);
    if(entry.note&&entry.note.trim()) lines.push('Nota: '+entry.note.trim());
    return lines.join('\n');
  } else if(entry.type==='panal'){
    var panalesHoy=hist.filter(function(h){return h.type==='panal'&&sameDay(h.time,entry.time);});
    var pnum=panalesHoy.length+1;
    var nota=entry.panal==='Caca'?'Caca registrada - buena senal de ingesta.':entry.panal==='Mixto'?'Panal mixto - todo en orden.':'Panal #'+pnum+' del dia.';
    var plines=['*Registro de Panal - Cefe*',fDT(entry.time),'Tipo: '+entry.panal,nota];
    if(entry.note&&entry.note.trim()) plines.push('Nota: '+entry.note.trim());
    return plines.join('\n');
  }
  return '';
}

function generateVisitaMsg(v,medico){
  var lines=['*Visita Medica - Cefe*'];
  lines.push('Medico: Dr/a. '+medico.nombre+' '+medico.apellido+' ('+medico.especialidad+')');
  lines.push('Fecha: '+fDateFull(v.datetime));
  lines.push('Hora: '+fTime(v.datetime));
  lines.push('Modalidad: '+v.modalidad.charAt(0).toUpperCase()+v.modalidad.slice(1));
  if(v.modalidad==='presencial'&&medico.direccion) lines.push('Direccion: '+medico.direccion);
  if(v.desc&&v.desc.trim()) lines.push('Observacion: '+v.desc.trim());
  lines.push('');
  // Google Calendar link
  var gcTitle=encodeURIComponent('Visita '+medico.especialidad+' - Cefe');
  var dt=new Date(v.datetime);
  var pad=function(n){return String(n).padStart(2,'0');};
  var dtStr=dt.getFullYear()+pad(dt.getMonth()+1)+pad(dt.getDate())+'T'+pad(dt.getHours())+pad(dt.getMinutes())+'00';
  var dtEnd=new Date(dt.getTime()+60*60000);
  var dtEndStr=dtEnd.getFullYear()+pad(dtEnd.getMonth()+1)+pad(dtEnd.getDate())+'T'+pad(dtEnd.getHours())+pad(dtEnd.getMinutes())+'00';
  var gcDetails=encodeURIComponent(v.desc||'');
  var gcLocation=encodeURIComponent(v.modalidad==='presencial'?medico.direccion:'Virtual');
  var gcLink='https://calendar.google.com/calendar/render?action=TEMPLATE&text='+gcTitle+'&dates='+dtStr+'/'+dtEndStr+'&details='+gcDetails+'&location='+gcLocation;
  lines.push('Agendar en Google Calendar: '+gcLink);
  if(medico.telefono){
    var waPhone=medico.telefono.replace(/\D/g,'');
    lines.push('WhatsApp del medico: https://wa.me/'+waPhone);
  }
  return lines.join('\n');
}

// ── TIMER ──
function startTimer(){
  stopTimer();S.elapsed=0;
  S.timerInterval=setInterval(function(){
    S.elapsed=Math.floor((Date.now()-S.sideStart)/1000);
    var el=document.getElementById('timer-display');
    if(el) el.textContent=Math.floor(S.elapsed/60)+':'+String(S.elapsed%60).padStart(2,'0');
  },1000);
}
function stopTimer(){if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}S.elapsed=0;}

// ── ALARM ──
function scheduleAlarm(nextToma){
  if(S.alarmTimer) clearTimeout(S.alarmTimer);
  S.alarmFired=false;S.alarmNextTime=new Date(nextToma);
  var ms=new Date(nextToma).getTime()-Date.now();
  if(ms>0&&ms<4*3600000){
    S.alarmTimer=setTimeout(function(){S.alarmFired=true;if(S.step==='home')render();},ms);
  }
}

// ── NAV ──
function navTo(dest){if(S.step===dest){setStep('home');}else{S.historyFilter=null;setStep(dest);}}

// ── TOMA ──
function startToma(manual){
  S.manualMode=!!manual;
  S.tomaStart=new Date();S.lados=[];S.currentSide=null;S.sideStart=null;
  S.extraction={left:0,right:0};S.tomaNote='';
  S.manualDate=todayStr();S.manualTimeStart='';S.manualTimeEnd='';
  S.manualLados=[];S.manualCurrentSide='';S.manualCurrentMins='';
  setStep('toma');
}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function startSide(side){
  if(S.currentSide&&S.sideStart){var m=Math.max(1,Math.round((Date.now()-S.sideStart)/60000));S.lados.push({side:S.currentSide,mins:m});}
  S.currentSide=side;S.sideStart=Date.now();startTimer();render();
}
function finishSide(){
  if(!S.currentSide||!S.sideStart) return;
  var m=Math.max(1,Math.round((Date.now()-S.sideStart)/60000));
  S.lados.push({side:S.currentSide,mins:m});S.currentSide=null;S.sideStart=null;stopTimer();render();
}

function addManualLado(){
  var side=document.getElementById('manual-side-sel').value;
  var mins=parseInt(document.getElementById('manual-mins-input').value)||0;
  if(!side||mins<=0){alert('Selecciona lado y minutos.');return;}
  S.manualLados.push({side:side,mins:mins});
  document.getElementById('manual-mins-input').value='';
  render();
}
function removeManualLado(i){S.manualLados.splice(i,1);render();}

function finishToma(){
  var finalLados,startTime,endTime,note,extrL,extrR;
  if(S.manualMode){
    var dateVal=document.getElementById('manual-date-inp').value;
    var timeStartVal=document.getElementById('manual-start-inp').value;
    var timeEndVal=document.getElementById('manual-end-inp').value;
    if(!dateVal||!timeStartVal){alert('Ingresa fecha y hora de inicio.');return;}
    startTime=new Date(dateVal+'T'+timeStartVal);
    endTime=timeEndVal?new Date(dateVal+'T'+timeEndVal):new Date(startTime.getTime()+S.manualLados.reduce(function(a,b){return a+b.mins;},0)*60000);
    finalLados=S.manualLados.slice();
    note=document.getElementById('toma-note-input')?document.getElementById('toma-note-input').value:'';
    extrL=S.extraction.left;extrR=S.extraction.right;
  } else {
    var fl=S.lados.slice();
    if(S.currentSide&&S.sideStart) fl.push({side:S.currentSide,mins:Math.max(1,Math.round((Date.now()-S.sideStart)/60000))});
    if(fl.length===0){alert('Registra al menos un lado.');return;}
    stopTimer();
    startTime=S.tomaStart;endTime=new Date();finalLados=fl;
    note=document.getElementById('toma-note-input')?document.getElementById('toma-note-input').value:'';
    extrL=S.extraction.left;extrR=S.extraction.right;
  }
  if(finalLados.length===0){alert('Agrega al menos un lado.');return;}
  var total=finalLados.reduce(function(a,b){return a+b.mins;},0);
  var nextToma=addMins(startTime,180);
  var entry={type:'toma',start:startTime,end:endTime,lados:finalLados,totalMins:total,extraction:{left:extrL,right:extrR},nextToma:nextToma,note:note};
  var msg=generateMsg(entry,S.history);
  S.history.unshift(entry);saveData();
  scheduleAlarm(nextToma);
  S._summaryMsg=msg;S._summaryType='toma';setStep('summary');
}

// ── EXPORT ──
function exportToCSV(){
  var rows=[['Tipo','Fecha','Hora Inicio','Hora Fin','Duracion (min)','Lados','Ext Izq ml','Ext Der ml','Panal','Nota']];
  S.history.forEach(function(h){
    if(h.type==='toma'){
      rows.push(['Toma',fDate(h.start),fTime(h.start),fTime(h.end),h.totalMins,h.lados.map(function(l){return l.side+' '+l.mins+'m';}).join(' + '),h.extraction.left,h.extraction.right,'',h.note||'']);
    } else {
      rows.push(['Panal',fDate(h.time),fTime(h.time),'','','','','',h.panal,h.note||'']);
    }
  });
  S.pesoHistory.forEach(function(p){
    rows.push(['Peso',fDate(p.time),fTime(p.time),'','','','','','',gramsToKg(p.grams)+' kg'+(p.note?' - '+p.note:'')]);
  });
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='cefe-registro.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function exportAndEmail(){
  exportToCSV();
  setTimeout(function(){
    var sub=encodeURIComponent('Registro Ceferino - '+fDate(new Date()));
    var body=encodeURIComponent('Adjunto el CSV con el registro de lactancia, panales y peso de Cefe.\n\nExportado el '+fDateFull(new Date()));
    window.location.href='mailto:?subject='+sub+'&body='+body;
  },800);
}

// ── RESUMEN ANALYSIS ──
function buildResumen(days){
  var now=new Date();
  var cutoff=new Date(now.getTime()-days*24*3600000);
  var tomas=S.history.filter(function(h){return h.type==='toma'&&new Date(h.start)>=cutoff;});
  var panales=S.history.filter(function(h){return h.type==='panal'&&new Date(h.time)>=cutoff;});
  if(tomas.length===0&&panales.length===0&&S.pesoHistory.length===0) return '<div style="color:#a89070;font-size:13px">Sin datos suficientes todavia.</div>';

  var totalTomas=tomas.length;
  var totalMins=tomas.reduce(function(a,b){return a+b.totalMins;},0);
  var avgMins=totalTomas>0?Math.round(totalMins/totalTomas):0;
  var caca=panales.filter(function(p){return p.panal==='Caca';}).length;
  var mixto=panales.filter(function(p){return p.panal==='Mixto';}).length;
  var pis=panales.filter(function(p){return p.panal==='Pis';}).length;
  var totalExt=tomas.reduce(function(a,b){return a+(b.extraction.left||0)+(b.extraction.right||0);},0);

  // Peso analysis
  var pesoHTML='';
  if(S.pesoHistory.length>=2){
    var ultimo=S.pesoHistory[0];var anterior=S.pesoHistory[1];
    var diff=ultimo.grams-anterior.grams;
    var trend=diff>=0?'subio':'bajo';
    var color=diff>=0?'#64c8b4':'#e07070';
    pesoHTML='<div class="summary-line">Ultimo peso: <strong style="color:#f0d9a0">'+gramsToKg(ultimo.grams)+' kg</strong> ('+fDate(ultimo.time)+')</div>'+
      '<div class="summary-line">Vs anterior: <strong style="color:'+color+'">'+(diff>=0?'+':'')+diff+'g — '+trend+'</strong></div>'+
      '<div class="summary-line" style="font-size:11px;color:#a89070">Objetivo: recuperar peso de nacimiento (3.365 kg = 3365 g)</div>';
    var faltaParaNacimiento=3365-ultimo.grams;
    if(faltaParaNacimiento>0){
      pesoHTML+='<div class="summary-line" style="color:#e07070">Faltan <strong>'+faltaParaNacimiento+'g</strong> para recuperar peso de nacimiento.</div>';
    } else {
      pesoHTML+='<div class="summary-line" style="color:#64c8b4">Supero el peso de nacimiento en <strong>'+(Math.abs(faltaParaNacimiento))+'g</strong>.</div>';
    }
  } else if(S.pesoHistory.length===1){
    pesoHTML='<div class="summary-line">Peso registrado: <strong style="color:#f0d9a0">'+gramsToKg(S.pesoHistory[0].grams)+' kg</strong></div>';
  }

  // Intervals between tomas
  var intervalMsg='';
  if(tomas.length>=2){
    var sorted=tomas.slice().sort(function(a,b){return new Date(a.start)-new Date(b.start);});
    var intervals=[];
    for(var i=1;i<sorted.length;i++){
      intervals.push(Math.round((new Date(sorted[i].start)-new Date(sorted[i-1].start))/60000));
    }
    var avgInterval=Math.round(intervals.reduce(function(a,b){return a+b;},0)/intervals.length);
    intervalMsg='<div class="summary-line">Intervalo promedio entre tomas: <strong style="color:#f0d9a0">'+avgInterval+' min ('+Math.round(avgInterval/60*10)/10+'h)</strong></div>';
  }

  return '<div class="summary-card"><div class="summary-title">Lactancia (ultimos '+days+' dias)</div>'+
    '<div class="summary-line">Tomas registradas: <strong style="color:#f0d9a0">'+totalTomas+'</strong></div>'+
    '<div class="summary-line">Duracion promedio: <strong style="color:#f0d9a0">'+avgMins+' min</strong></div>'+
    '<div class="summary-line">Tiempo total al pecho: <strong style="color:#f0d9a0">'+totalMins+' min</strong></div>'+
    intervalMsg+
    (totalExt>0?'<div class="summary-line">Total extraido: <strong style="color:#f0d9a0">'+totalExt+'ml</strong></div>':'')+
    '</div>'+
    '<div class="summary-card"><div class="summary-title">Panales (ultimos '+days+' dias)</div>'+
    '<div class="summary-line">Total panales: <strong style="color:#f0d9a0">'+panales.length+'</strong></div>'+
    '<div class="summary-line">Pis: <strong>'+pis+'</strong> | Caca: <strong style="color:#64c8b4">'+caca+'</strong> | Mixto: <strong>'+mixto+'</strong></div>'+
    (panales.length>0&&caca+mixto>=panales.length*0.3?'<div class="summary-line" style="color:#64c8b4;font-size:11px">Buena proporcion de cacas — senal positiva de ingesta.</div>':'<div class="summary-line" style="color:#e09070;font-size:11px">Pocas cacas registradas — observar ingesta.</div>')+
    '</div>'+
    (pesoHTML?'<div class="summary-card"><div class="summary-title">Evolucion de Peso</div>'+pesoHTML+'</div>':'');
}

function copyText(text){

  var btn=document.getElementById('copy-btn');
  if(btn){btn.textContent='Copiado!';btn.classList.add('done');setTimeout(function(){btn.textContent='Copiar mensaje';btn.classList.remove('done');},2000);}

function copyHistory(){
  var items=getFiltered();
  var text=items.map(function(h){
    if(h.type==='toma'){var lstr=h.lados.map(function(l){return l.side+' '+l.mins+'min';}).join(' + ');return 'Toma '+fDT(h.start)+' | '+lstr+' ('+h.totalMins+'min)'+(h.note?' | '+h.note:'');}
    return 'Panal '+fDT(h.time)+' | '+h.panal+(h.note?' | '+h.note:'');
  }).join('\n');
  navigator.clipboard.writeText(text).catch(function(){var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);});

        '</div></div>'+
        '<div class="notes-box"><div class="section-label">Notas</div><textarea class="notes-input" id="toma-note-input" placeholder="Observaciones..."></textarea></div>'+
        (S.manualLados.length>0?'<button class="p-btn gold" onclick="finishToma()">Guardar toma</button>':'')+
        '<button class="g-btn red" onclick="setStep(\'home\')">Cancelar</button>';
    } else {
      // Live timer entry
      var ladosHTML=S.lados.length>0?'<div class="lados-box">'+S.lados.map(function(l){return '<div class="lado-item">✓ '+l.side+' — '+l.mins+' min</div>';}).join('')+'</div>':'';
      var timerHTML=S.currentSide?'<div class="timer-box"><div class="timer-side">'+S.currentSide+'</div><div class="timer-display" id="timer-display">0:00</div><button class="p-btn gold" style="margin-top:12px;width:auto;padding:10px 22px" onclick="finishSide()">Terminar este lado</button></div>':'';
      var sideGrid=!S.currentSide?'<div class="muted">'+(S.lados.length===0?'Por que lado empieza?':'Continua en otro lado?')+'</div><div class="side-grid">'+SIDES.map(function(s){return '<button class="side-btn" onclick="startSide(\''+s.replace(/'/g,"\\'")+'\')" >'+s+'</button>';}).join('')+'</div>':'';
      var finBtn=S.lados.length>0&&!S.currentSide?'<button class="p-btn gold" onclick="finishToma()">Finalizar y generar mensaje</button>':'';
      body.innerHTML=
        '<button class="back-btn" onclick="discardCurrent()">← Descartar y volver</button>'+
        '<div class="screen-title">Nueva Toma</div><div class="screen-sub">Inicio: '+fTime(S.tomaStart)+'</div>'+
        ladosHTML+timerHTML+sideGrid+
        '<div class="ext-box"><div class="section-label">Extraccion (ml)</div><div class="ml-row">'+
          '<div class="ml-col"><div class="ml-label">Izquierdo</div><div class="ml-controls"><button class="ml-btn" onclick="S.extraction.left=Math.max(0,S.extraction.left-5);render()">-</button><div class="ml-val">'+S.extraction.left+'</div><button class="ml-btn" onclick="S.extraction.left+=5;render()">+</button></div></div>'+
          '<div class="ml-col"><div class="ml-label">Derecho</div><div class="ml-controls"><button class="ml-btn" onclick="S.extraction.right=Math.max(0,S.extraction.right-5);render()">-</button><div class="ml-val">'+S.extraction.right+'</div><button class="ml-btn" onclick="S.extraction.right+=5;render()">+</button></div></div>'+
        '</div></div>'+
        '<div class="notes-box"><div class="section-label">Notas</div><textarea class="notes-input" id="toma-note-input" placeholder="Ej: Cefe se prendo bien..."></textarea></div>'+
        finBtn+'<button class="g-btn red" onclick="discardCurrent()">Descartar</button>';
      if(S.currentSide&&S.sideStart){var el=document.getElementById('timer-display');if(el)el.textContent=Math.floor(S.elapsed/60)+':'+String(S.elapsed%60).padStart(2,'0');}
    }
  }

  else if(S.step==='panal'){
    body.innerHTML=
      '<button class="back-btn" onclick="discardCurrent()">← Descartar y volver</button>'+
      '<div class="screen-title">Cambio de Panal</div><div class="screen-sub">'+fDT(S.panalTime)+'</div>'+
      '<button class="panal-btn pis" onclick="finishPanal(\'Pis\')"><span style="font-size:20px">💛</span><span>Pis</span></button>'+
      '<button class="panal-btn caca" onclick="finishPanal(\'Caca\')"><span style="font-size:20px">💩</span><span>Caca</span></button>'+
      '<button class="panal-btn mixto" onclick="finishPanal(\'Mixto\')"><span style="font-size:20px">🔀</span><span>Mixto</span></button>'+
      '<div class="notes-box" style="margin-top:12px"><div class="section-label">Nota</div><textarea class="notes-input" id="panal-note-input" placeholder="Opcional..."></textarea></div>'+
      '<button class="g-btn red" onclick="discardCurrent()">Descartar</button>';
  }

  else if(S.step==='pesoEntry'){
    body.innerHTML=
      '<button class="back-btn" onclick="setStep(\'peso\')">← Volver</button>'+
      '<div class="screen-title">Registrar Peso</div><div class="screen-sub">'+fDT(new Date())+'</div>'+
      '<div class="peso-input-wrap">'+
        '<div class="peso-display">'+gramsToKg(S.pesoGrams)+'</div><div class="peso-unit">kg</div>'+
        '<div class="peso-controls">'+
          '<button class="peso-btn" onclick="adjustPeso(-100)">-100g</button>'+
          '<button class="peso-btn" onclick="adjustPeso(-10)">-10g</button>'+
          '<button class="peso-btn big" onclick="adjustPeso(-1)">-1g</button>'+
          '<button class="peso-btn big" onclick="adjustPeso(1)">+1g</button>'+
          '<button class="peso-btn" onclick="adjustPeso(10)">+10g</button>'+
          '<button class="peso-btn" onclick="adjustPeso(100)">+100g</button>'+
        '</div>'+
      '</div>'+
      '<div class="notes-box"><div class="section-label">Nota</div><textarea class="notes-input" id="peso-note-input" placeholder="Ej: Pesado en consultorio..."></textarea></div>'+
      '<button class="p-btn teal" onclick="savePeso()">Guardar peso</button>'+
      '<button class="g-btn red" onclick="setStep(\'peso\')">Cancelar</button>';
  }

  else if(S.step==='peso'){
    var pesoRows=S.pesoHistory.length===0?'<div style="color:#a89070;font-size:13px;margin-top:8px">Sin registros todavia.</div>':
      S.pesoHistory.map(function(p,i){
        var prev=S.pesoHistory[i+1];
        var diffHTML='';
        if(prev){var d=p.grams-prev.grams;diffHTML='<div class="peso-diff '+(d>=0?'up':'down')+'">'+(d>=0?'+':'')+d+'g vs anterior</div>';}
        return '<div class="h-row peso"><div><div class="h-time">'+fDT(p.time)+'</div>'+(p.note?'<div class="h-sub">'+p.note+'</div>':'')+diffHTML+'</div><div class="h-right"><div style="font-size:16px;font-weight:bold;color:#64c8b4">'+gramsToKg(p.grams)+'kg</div><button class="del-btn" onclick="deletePeso('+i+')">x</button></div></div>';
      }).join('');
    body.innerHTML=
      '<div class="screen-title">Curva de Peso</div>'+
      '<div style="font-size:11px;color:#a89070;margin-bottom:16px">Peso nacimiento: <strong style="color:#f0d9a0">3.365 kg</strong></div>'+
      '<button class="action-btn teal" onclick="startPeso()"><div class="action-icon teal">+</div><div><div class="action-label">Registrar nuevo peso</div></div></button>'+
      (S.pesoHistory.length>0?'<button class="p-btn grey" id="copy-peso-btn" onclick="copyPesoHistory()" style="margin-bottom:14px;margin-top:2px">Copiar historial de peso</button>':'')+
      '<div>'+pesoRows+'</div>';
  }

  else if(S.step==='medicos'){
    var medicoCards=S.medicos.length===0?'<div style="color:#a89070;font-size:13px;margin-top:8px">Sin medicos registrados.</div>':
      S.medicos.map(function(m,i){
        return '<div class="medico-card"><div class="medico-name">Dr/a. '+m.nombre+' '+m.apellido+'</div><div class="medico-spec">'+m.especialidad+'</div><div class="medico-detail">'+(m.telefono?'Tel: '+m.telefono+'<br>':'')+( m.email?'Email: '+m.email+'<br>':'')+(m.direccion?'Dir: '+m.direccion:'')+'</div><div class="medico-actions"><button class="medico-act-btn" onclick="editMedico('+i+')">Editar</button><button class="medico-act-btn" onclick="deleteMedico('+i+')">Eliminar</button></div></div>';
      }).join('');
    var visitaCards=S.visitas.length===0?'':'<div style="margin-top:20px"><div class="section-label">Proximas visitas</div>'+S.visitas.slice(0,5).map(function(v,i){var m=S.medicos[v.medicoIdx]||{};return '<div class="h-row visita"><div><div class="h-time">'+fDate(v.datetime)+' '+fTime(v.datetime)+'</div><div class="h-sub">Dr/a. '+m.nombre+' '+m.apellido+' | '+v.modalidad+'</div></div><div class="h-right"><button class="del-btn" onclick="deleteVisita('+i+')">x</button></div></div>';}).join('')+'</div>';
    body.innerHTML=
      '<div class="screen-title">Medicos de Cefe</div>'+
      '<button class="action-btn purple" onclick="startAddMedico()"><div class="action-icon purple">+</div><div><div class="action-label">Agregar medico</div><div class="action-sub">Registrar nuevo profesional</div></div></button>'+
      (S.medicos.length>0?'<button class="action-btn rose" onclick="startAddVisita()"><div class="action-icon rose">📅</div><div><div class="action-label">Agendar visita</div><div class="action-sub">Programar consulta medica</div></div></button>':'')+
      '<div style="margin-top:16px"><div class="section-label">Profesionales</div>'+medicoCards+'</div>'+
      visitaCards;
  }

  else if(S.step==='medicoForm'){
    var mf=S.medicoForm;
    body.innerHTML=
      '<button class="back-btn" onclick="setStep(\'medicos\')">← Volver</button>'+
      '<div class="screen-title">'+(S.editMedicoIdx>=0?'Editar Medico':'Agregar Medico')+'</div>'+
      '<div class="form-field"><label class="form-label">Especialidad</label><input class="form-input" id="mf-esp" value="'+esc(mf.especialidad)+'" placeholder="Pediatra, Neonatólogo..."></div>'+
      '<div class="form-row">'+
        '<div class="form-field"><label class="form-label">Nombre</label><input class="form-input" id="mf-nom" value="'+esc(mf.nombre)+'" placeholder="Juan"></div>'+
        '<div class="form-field"><label class="form-label">Apellido</label><input class="form-input" id="mf-ape" value="'+esc(mf.apellido)+'" placeholder="Garcia"></div>'+
      '</div>'+
      '<div class="form-field"><label class="form-label">Direccion consultorio</label><input class="form-input" id="mf-dir" value="'+esc(mf.direccion)+'" placeholder="Av. Corrientes 1234, CABA"></div>'+
      '<div class="form-row">'+
        '<div class="form-field"><label class="form-label">Telefono (con codigo pais)</label><input class="form-input" id="mf-tel" value="'+esc(mf.telefono)+'" placeholder="5491112345678"></div>'+
        '<div class="form-field"><label class="form-label">Email</label><input class="form-input" id="mf-email" value="'+esc(mf.email)+'" placeholder="doctor@mail.com"></div>'+
      '</div>'+
      '<button class="p-btn purple" onclick="saveMedico()">Guardar medico</button>'+
      '<button class="g-btn red" onclick="setStep(\'medicos\')">Cancelar</button>';
  }

  else if(S.step==='visitaForm'){
    var medicoOptions=S.medicos.map(function(m,i){return '<option value="'+i+'">Dr/a. '+m.nombre+' '+m.apellido+' ('+m.especialidad+')</option>';}).join('');
    body.innerHTML=
      '<button class="back-btn" onclick="setStep(\'medicos\')">← Volver</button>'+
      '<div class="screen-title">Agendar Visita Medica</div>'+
      '<div class="form-field"><label class="form-label">Medico</label><select class="form-select" id="v-medico-sel">'+medicoOptions+'</select></div>'+
      '<div class="form-row">'+
        '<div class="form-field"><label class="form-label">Fecha</label><input type="date" class="form-input" id="v-fecha" value="'+S.visitaFecha+'"></div>'+
        '<div class="form-field"><label class="form-label">Hora</label><input type="time" class="form-input" id="v-hora" value="'+S.visitaHora+'"></div>'+
      '</div>'+
      '<div class="form-field"><label class="form-label">Modalidad</label>'+
        '<div class="radio-group">'+
          '<button class="radio-btn '+(S.visitaModalidad==='presencial'?'sel':'')+'" data-val="presencial" onclick="S.visitaModalidad=\'presencial\';setRadio(\'presencial\')">Presencial</button>'+
          '<button class="radio-btn '+(S.visitaModalidad==='virtual'?'sel':'')+'" data-val="virtual" onclick="S.visitaModalidad=\'virtual\';setRadio(\'virtual\')">Virtual</button>'+
        '</div>'+
      '</div>'+
      '<div class="form-field"><label class="form-label">Descripcion / Motivo</label><textarea class="notes-input form-input" id="v-desc" placeholder="Control de peso, consulta por..." style="min-height:52px"></textarea></div>'+
      '<button class="p-btn rose" onclick="saveVisita()" style="background:rgba(220,140,160,0.8);color:#0f1923">Guardar y generar mensaje</button>'+
      '<button class="g-btn red" onclick="setStep(\'medicos\')">Cancelar</button>';
  }

  else if(S.step==='summary'){
    var typeLabel=S.step;
    body.innerHTML=
      '<div class="screen-title">Mensaje listo</div>'+
      '<div style="font-size:11px;color:#a89070;margin-bottom:14px">Copia el texto y pegalo en WhatsApp</div>'+
      '<div class="msg-box">'+S._summaryMsg+'</div>'+
      '<button class="p-btn green" id="copy-btn" onclick="copyText(\''+escMsg(S._summaryMsg)+'\')">Copiar mensaje</button>'+
      '<button class="g-btn white" onclick="setStep(\'home\')">Volver al inicio</button>'+
      (S._summaryType==='toma'||S._summaryType==='panal'?'<button class="g-btn red" onclick="S.history.shift();saveData();setStep(\'home\')">Borrar este registro</button>':'');
  }

  else if(S.step==='history'){
    var filtered=getFiltered();
    var ft=filtered.filter(function(h){return h.type==='toma';});
    var fp=filtered.filter(function(h){return h.type==='panal';});
    var totalMin=ft.reduce(function(a,b){return a+b.totalMins;},0);
    var dayKeys=[...new Set(S.history.map(getDayKey))];
    var filterBtns='<button class="filter-btn'+(S.historyFilter?'':' active')+'" onclick="setFilter(null)">Todos</button>'+
      dayKeys.map(function(key){
        var sample=S.history.find(function(h){return getDayKey(h)===key;});
        return '<button class="filter-btn'+(S.historyFilter===key?' active':'')+'" onclick="setFilter(\''+key+'\')">'+fDate(sample.type==='toma'?sample.start:sample.time)+'</button>';
      }).join('');
    var rows=filtered.map(function(h){return renderRow(h,S.history.indexOf(h));}).join('');
    body.innerHTML=
      '<div class="screen-title">Historial</div>'+
      (S.history.length===0?'<div style="color:#a89070;font-size:13px">Sin registros.</div>':
        '<div style="margin-bottom:14px"><div class="section-label">Filtrar por dia</div><div class="filter-row">'+filterBtns+'</div></div>'+
        '<div class="stat-mini"><div class="stat-box"><div class="val">'+ft.length+'</div><div class="lbl">Tomas</div></div><div class="stat-box"><div class="val">'+totalMin+'</div><div class="lbl">Min</div></div><div class="stat-box"><div class="val">'+fp.length+'</div><div class="lbl">Panales</div></div></div>'+
        '<button class="p-btn grey" id="copy-hist-btn" onclick="copyHistory()" style="margin-bottom:14px">Copiar historial</button>'+
        '<div>'+rows+'</div>')+
      '<div style="margin-top:20px"><div class="section-label">Exportar</div>'+
      '<div class="export-btn" onclick="exportToCSV()"><div class="export-icon">📊</div><div><div class="action-label">Exportar a CSV (Excel)</div><div class="action-sub">Descarga archivo para abrir en Excel</div></div></div>'+
      '<div class="export-btn" onclick="exportAndEmail()"><div class="export-icon">📧</div><div><div class="action-label">Exportar + Enviar por email</div><div class="action-sub">Descarga CSV y abre tu correo</div></div></div></div>';
  }

  else if(S.step==='resumen'){
    var periodBtns=['1','3','7','14'].map(function(d){return '<button class="filter-btn'+(S._resumenDays===parseInt(d)?' active':'')+'" onclick="S._resumenDays='+d+';render()">'+d+(d==='1'?' dia':' dias')+'</button>';}).join('');
    if(!S._resumenDays) S._resumenDays=1;
    body.innerHTML=
      '<div class="screen-title">Resumen de Evolucion</div>'+
      '<div style="margin-bottom:16px"><div class="section-label">Periodo</div><div class="filter-row">'+periodBtns+'</div></div>'+
      buildResumen(S._resumenDays);
  }
}

function renderRow(h,i){
  if(h.type==='toma'){
    var ltxt=h.lados.map(function(l){return l.side.split(' ')[0]+' '+l.mins+'m';}).join(' · ');
    return '<div class="h-row toma"><div><div class="h-time">🍼 '+fTime(h.start)+'</div><div class="h-sub">'+ltxt+(h.note?' | '+h.note.substring(0,25):'')+'</div></div><div class="h-right"><div class="h-mins">'+h.totalMins+'m</div><button class="del-btn" onclick="deleteItem('+i+')">x</button></div></div>';
  }
  var emo=h.panal==='Pis'?'💛':h.panal==='Caca'?'💩':'🔀';
  return '<div class="h-row panal"><div><div class="h-time" style="color:#c0d4e4">🧷 '+fTime(h.time)+' — '+h.panal+'</div>'+(h.note?'<div class="h-sub">'+h.note.substring(0,30)+'</div>':'')+'</div><div class="h-right"><span style="font-size:16px">'+emo+'</span><button class="del-btn" onclick="deleteItem('+i+')">x</button></div></div>';
}

function deleteItem(i){S.history.splice(i,1);saveData();render();}
function deletePeso(i){S.pesoHistory.splice(i,1);saveData();render();}
function discardCurrent(){stopTimer();S.currentSide=null;S.sideStart=null;setStep('home');}
function copyPesoHistory(){
  var text='Registro peso Cefe\n'+S.pesoHistory.map(function(p){return fDT(p.time)+': '+gramsToKg(p.grams)+' kg'+(p.note?' ('+p.note+')':'');}).join('\n');
  navigator.clipboard.writeText(text).catch(function(){var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);});
}
function escMsg(m){return m.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');}
function esc(s){return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

render();
</script>
</body>
</html>
