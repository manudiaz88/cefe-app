// ─── DETECCIÓN CONTEXTUAL DE SÍNTOMAS ───────────────────────
function checkSintomasContextuales(){
  var hoy=todayStr();
  var askKey='sint_asked_'+hoy;
  if(ls(askKey))return; // ya preguntamos hoy
  var alertas=[];
  // 1. Muchos días sin caca (>3 días)
  var cacas=D.hist.filter(function(h){return h.type==='panal'&&(h.p==='Caca'||h.p==='Mixto');});
  if(cacas.length>0){
    var ultimaCaca=new Date(cacas[0].t);
    var diasSinCaca=Math.floor((Date.now()-ultimaCaca.getTime())/86400000);
    if(diasSinCaca>=3&&ageD()>7)alertas.push({tipo:'sin deposición',msg:'No hay deposición hace '+diasSinCaca+' días.'});
  }
  // 2. Tomas muy cortas repetidas (posible rechazo / molestia)
  var tomasHoy=D.hist.filter(function(h){
    return h.type==='toma'&&sameDay(h.s,new Date());
  });
  if(tomasHoy.length>=3){
    var cortasHoy=tomasHoy.filter(function(h){return h.tot<5;});
    if(cortasHoy.length>=3)alertas.push({tipo:'tomas cortas',msg:'3 o más tomas de menos de 5 minutos hoy.'});
  }
  // 3. Muchos más pañales de lo habitual (>12 en el día)
  var panalesHoy=D.hist.filter(function(h){return h.type==='panal'&&sameDay(h.t,new Date());});
  if(panalesHoy.length>12)alertas.push({tipo:'muchos pañales',msg:panalesHoy.length+' pañales hoy (inusualmente alto).'});
  if(alertas.length===0)return;
  lss(askKey,'1');
  var alerta=alertas[0];
  setTimeout(function(){
    showCpop('info','??','Céfiro detectó algo',
      'Patrón inusual',
      alerta.msg+' ¿Querés registrar un síntoma?',
      'Registrar síntoma',
      function(){closeCpop();setStep('sintomas');});
  },2500);
}
function calcRacha() {
  var racha=0,d=new Date();
  for(var i=0;i<60;i++){
    var dd=new Date(d);dd.setDate(dd.getDate()-i);
    var tiene=D.hist.some(function(h){return sameDay(h.type==='toma'?h.s:h.t,dd);})||D.pesos.some(function(p){return sameDay(p.t,dd);});
    if(tiene)racha++;else break;
  }
  return racha;
}

function getLogrosDesbloqueados() {
  return LOGROS_DEF.filter(function(l){
    try{return l.check();}catch(e){return false;}
  });
}

// IDs de logros triviales (primer registro — el usuario ya lo sabe)
var LOGROS_TRIVIALES=['p_primer_panal','t_primer_toma','t_primera_semana'];

function checkNuevosLogros() {
  if(!D.logrosVistos)D.logrosVistos={};
  var cfg=D.config||{};var notif=cfg.notif||{};
  var mostrarTriviales=notif.logros_triviales!==false;
  var desbloqueados=getLogrosDesbloqueados();
  var nuevos=desbloqueados.filter(function(l){
    if(D.logrosVistos[l.id])return false;
    // Filtrar triviales si config lo dice
    if(!mostrarTriviales&&LOGROS_TRIVIALES.indexOf(l.id)>=0){
      D.logrosVistos[l.id]=true; // marcar como visto sin celebrar
      return false;
    }
    return true;
  });
  if(nuevos.length===0)return;
  var logro=nuevos[0];
  D.logrosVistos[logro.id]=true;
  saveData();
  showCpop('celebracion',logro.ic,'🏆 Nuevo logro desbloqueado',logro.titulo,logro.desc,'¡Genial!',function(){
    closeCpop();
    if(nuevos.length>1){setTimeout(checkNuevosLogros,400);}
  });
}

function renderLogros(bd) {
  var desbloqueados=getLogrosDesbloqueados();
  var totalDes=desbloqueados.length;

  // ── Header — celebra lo conseguido, no muestra lo que falta ──
  var hdr=mkDiv('text-align:center;margin-bottom:20px');
  if(totalDes===0){
    hdr.appendChild(mkTxt('div',null,'🌱','font-size:36px;margin-bottom:8px'));
    hdr.appendChild(mkTxt('div',null,'El camino empieza ahora','font-size:17px;font-weight:bold;color:#f0d9a0'));
    hdr.appendChild(mkTxt('div',null,'Cada registro es un paso. Los logros aparecen solos.','font-size:12px;color:#a89070;margin-top:5px;line-height:1.5'));
  } else {
    hdr.appendChild(mkTxt('div',null,'🏆','font-size:36px;margin-bottom:6px'));
    hdr.appendChild(mkTxt('div',null,totalDes+' logro'+(totalDes!==1?'s':'')+' conseguido'+(totalDes!==1?'s':''),'font-size:18px;font-weight:bold;color:#f0d9a0'));
    hdr.appendChild(mkTxt('div',null,'El camino de Sari y Manu como padres de Cefe','font-size:11px;color:#a89070;margin-top:3px'));
  }
  bd.appendChild(hdr);

  if(totalDes===0){
    var emp=mkDiv('background:rgba(255,255,255,.03);border-radius:14px;padding:20px;text-align:center');
    emp.appendChild(mkTxt('div',null,'Registrá la primera toma o el primer pañal y aparecerá tu primer logro.','font-size:12px;color:#a89070;line-height:1.6'));
    bd.appendChild(emp);
    return;
  }

  // ── Solo mostrar los desbloqueados, agrupados por categoría ──
  var cats={
    'lactancia': {label:'🍼 Lactancia',  color:'#d4a843'},
    'pañales':   {label:'🧷 Pañales',    color:'#64c8b4'},
    'peso':      {label:'⚖️ Peso',       color:'#b48cdc'},
    'salud':     {label:'🏥 Salud',      color:'#e07070'},
    'memoria':   {label:'📖 Memoria',    color:'#64c88c'},
    'constancia':{label:'🔥 Constancia', color:'#F28B66'},
  };

  var hayAlgo=false;
  Object.keys(cats).forEach(function(catKey){
    var cat=cats[catKey];
    var descat=desbloqueados.filter(function(l){return l.cat===catKey;});
    if(descat.length===0)return; // No mostrar categorías vacías
    hayAlgo=true;

    var sec=mkDiv('margin-bottom:16px');
    sec.appendChild(mkTxt('div',null,cat.label,'font-size:11px;font-weight:bold;color:'+cat.color+';text-transform:uppercase;letter-spacing:1px;margin-bottom:8px'));

    descat.forEach(function(logro){
      var card=mkDiv('display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:13px;margin-bottom:7px;background:rgba(212,168,67,.06);border:1px solid rgba(212,168,67,.2)');
      // Ícono
      var icWrap=mkDiv('width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(212,168,67,.15);font-size:22px');
      icWrap.appendChild(mkTxt('span',null,logro.ic,''));
      card.appendChild(icWrap);
      // Texto
      var txt=mkDiv('flex:1');
      txt.appendChild(mkTxt('div',null,logro.titulo,'font-size:13px;font-weight:bold;color:#f0d9a0'));
      txt.appendChild(mkTxt('div',null,logro.desc,'font-size:11px;color:#a89070;margin-top:3px;line-height:1.4'));
      card.appendChild(txt);
      card.appendChild(mkTxt('span',null,'✓','font-size:18px;color:#64c88c;font-weight:bold;flex-shrink:0'));
      sec.appendChild(card);
    });
    bd.appendChild(sec);
  });

  // ── Mensaje de aliento al pie ──
  var pie=mkDiv('text-align:center;padding:16px 0 8px');
  var pieMsgs=[
    'Cada toma, cada pañal, cada nota — todo queda. Todo importa.',
    'Cefe no podría estar mejor acompañado.',
    'Lo más importante no está en ninguna pantalla — está en el vínculo.',
    'Ya ganaron el logro más importante: estar presentes.',
  ];
  var pieMsg=pieMsgs[Math.floor(new Date().getDate()%pieMsgs.length)];
  pie.appendChild(mkTxt('div',null,'🌬️ Céfiro dice:','font-size:10px;color:#a89070;margin-bottom:4px'));
  pie.appendChild(mkTxt('div',null,'"'+pieMsg+'"','font-size:12px;color:#b48cdc;font-style:italic;line-height:1.5'));
  bd.appendChild(pie);
}

loadData();
applyNightMode();
render();
setTimeout(checkOnboarding, 800);

</script>
<script type="module">

// ══════════════════════════════════════════════════════════════════════════
// ══  FIREBASE INIT
// ══════════════════════════════════════════════════════════════════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
var cfg={apiKey:"AIzaSyC5iVBZbLlD0a7yVRx4eDg6pOjRKNO28kA",authDomain:"cefe-app.firebaseapp.com",databaseURL:"https://cefe-app-default-rtdb.firebaseio.com",projectId:"cefe-app",storageBucket:"cefe-app.firebasestorage.app",messagingSenderId:"40391677831",appId:"1:40391677831:web:3640958b4450f2cd5ae522"};
var app=initializeApp(cfg);var db=getDatabase(app);
var dot=document.getElementById('sync-dot');var fbReady=false;
function setDot(c,t){if(dot){dot.style.color=c;dot.title=t||'';}}
function restoreDate(v){if(!v)return null;var d=new Date(v);return isNaN(d.getTime())?null:d;}
function restoreEntry(e){
  if(!e)return null;
  try{
    if(e.type==='toma'){var s=restoreDate(e.s);if(!s)return null;e.s=s;e.e=restoreDate(e.e)||new Date(s.getTime()+(e.tot||0)*60000);e.nt=restoreDate(e.nt)||new Date(s.getTime()+180*60000);}
    if(e.type==='panal'){var t=restoreDate(e.t);if(!t)return null;e.t=t;}
  }catch(ex){return null;}
  return e;
}
window.fbSave=function(data){
  if(!fbReady)return;
  setDot('#d4a843','Guardando...');
  set(ref(db,'cefe'),data).then(function(){setDot('#64c8b4','Sincronizado');}).catch(function(){setDot('#e07070','Error');});
};
onValue(ref(db,'cefe'),function(snap){
  var data=snap.val();fbReady=true;
  if(!data){setDot('#64c8b4','Conectado');if(typeof render==='function')render();return;}

  // ── MERGE SEGURO: Firebase nunca achica datos locales ──────
  // Para arrays con historial (hist, pesos, sintomas, notas, cartas):
  // Si Firebase tiene MÁS registros → usar Firebase (otro device agregó algo)
  // Si Firebase tiene MENOS → mantener local (Firebase aún no procesó nuestros datos)
  // Para objetos (bebe, momentos, config, hitos): merge con Object.assign
  // Para campos críticos (meds, visits, padres): igual criterio de cantidad

  function safeMergeArray(fbArr, localArr, restoreFn) {
    if(!fbArr||!Array.isArray(fbArr)) return localArr;
    var restored = fbArr.map(restoreFn).filter(Boolean);
    // Si Firebase tiene más → Firebase gana (otro device registró)
    // Si Firebase tiene igual o más → Firebase
    // Si Firebase tiene menos → mantener local (aún sincronizando)
    return restored.length >= localArr.length ? restored : localArr;
  }

  var fbHist = data.hist&&Array.isArray(data.hist)?data.hist.map(restoreEntry).filter(Boolean):null;
  if(fbHist!==null) D.hist = fbHist.length >= D.hist.length ? fbHist : D.hist;

  var fbPesos = data.pesos&&Array.isArray(data.pesos)?data.pesos.map(function(p){if(!p)return null;var t=restoreDate(p.t);if(!t)return null;return{t:t,g:p.g,n:p.n||''};}).filter(Boolean):null;
  if(fbPesos!==null) D.pesos = fbPesos.length >= D.pesos.length ? fbPesos : D.pesos;

  // Meds y visits: Firebase siempre gana si existe (son datos editados, no solo appended)
  if(data.meds&&Array.isArray(data.meds)&&data.meds.filter(Boolean).length>=D.meds.length)D.meds=data.meds.filter(Boolean);
  if(data.visits&&Array.isArray(data.visits)){
    var fbV=data.visits.map(function(v){if(!v)return null;var dt=restoreDate(v.dt);if(!dt)return null;return Object.assign({},v,{dt:dt});}).filter(Boolean);
    if(fbV.length>=D.visits.length)D.visits=fbV;
  }

  // bebe: merge siempre (campos individuales, no reemplazar completo)
  if(data.bebe&&typeof data.bebe==='object'){D.bebe=Object.assign({},D.bebe,data.bebe);if(!D.bebe.vacunas)D.bebe.vacunas={};}

  if(data.padres&&Array.isArray(data.padres)&&data.padres.filter(Boolean).length>=D.padres.length)D.padres=data.padres.filter(Boolean);

  // notas: merge por longitud
  if(data.notas&&Array.isArray(data.notas)&&data.notas.filter(Boolean).length>=D.notas.length)D.notas=data.notas.filter(Boolean);

  var fbSi=data.sintomas&&Array.isArray(data.sintomas)?data.sintomas.map(function(s){if(!s)return null;var t=restoreDate(s.t);if(!t)return null;return Object.assign({},s,{t:t});}).filter(Boolean):null;
  if(fbSi!==null&&fbSi.length>=D.sintomas.length)D.sintomas=fbSi;
  if(data.tallas&&Array.isArray(data.tallas)){var fbTl=data.tallas.map(function(e){if(!e)return null;var t=restoreDate(e.t);if(!t)return null;return{t:t,cm:e.cm,n:e.n||''};}).filter(Boolean);if(fbTl.length>=(D.tallas||[]).length)D.tallas=fbTl;}
  if(data.pcs&&Array.isArray(data.pcs)){var fbPc=data.pcs.map(function(e){if(!e)return null;var t=restoreDate(e.t);if(!t)return null;return{t:t,cm:e.cm,n:e.n||''};}).filter(Boolean);if(fbPc.length>=(D.pcs||[]).length)D.pcs=fbPc;}

  // hitos: merge — nunca perder hitos locales, agregar los de Firebase
  if(data.hitos&&Array.isArray(data.hitos)){
    var fbHi=data.hitos.filter(Boolean);
    fbHi.forEach(function(fh){if(!D.hitos.find(function(lh){return lh.id===fh.id;}))D.hitos.push(fh);});
  }

  if(data.cartas&&Array.isArray(data.cartas)&&data.cartas.filter(Boolean).length>=D.cartas.length)D.cartas=data.cartas.filter(Boolean);

  // momentos: merge respondidos (union), descartados por device (no tocar otros)
  if(data.momentos&&typeof data.momentos==='object'){
    if(!D.momentos)D.momentos={respondidos:{},descartados:{}};
    if(data.momentos.respondidos)Object.assign(D.momentos.respondidos,data.momentos.respondidos);
    if(data.momentos.descartados&&typeof data.momentos.descartados==='object'){
      Object.keys(data.momentos.descartados).forEach(function(devId){
        if(devId!==DEVICE_ID)D.momentos.descartados[devId]=data.momentos.descartados[devId];
      });
    }
  }

  if(data.sleepLog&&Array.isArray(data.sleepLog)&&data.sleepLog.length>=D.sleepLog.length)D.sleepLog=data.sleepLog;
  if(data.sleepStart&&!D.sleepStart)D.sleepStart=data.sleepStart;
  if(typeof data.nightMode==='boolean')D.nightMode=data.nightMode;
  if(typeof data.alarmMaxInterval==='number')D.alarmMaxInterval=data.alarmMaxInterval;

  // actividadesHechas: merge (union de fechas)
  if(data.actividadesHechas&&typeof data.actividadesHechas==='object'){
    Object.keys(data.actividadesHechas).forEach(function(k){
      if(!D.actividadesHechas[k])D.actividadesHechas[k]=data.actividadesHechas[k];
    });
  }

  // config: Firebase gana si existe (es configuración del usuario, se sincroniza entre devices)
  if(data.config&&typeof data.config==='object'){
    var defNotif={cefiro_tips:true,logros_triviales:false,dato_dia:true,brotes:true,vacunas:true,hitos:true,plan_dia:true};
    D.config=Object.assign({notif:defNotif,historial_expandido:true,perfil_home:true},data.config,{notif:Object.assign(defNotif,(data.config.notif||{}))});
  }
  // onboarding: merge (Firebase gana para datos respondidos compartidos)
  if(data.onboarding&&typeof data.onboarding==='object'){
    D.onboarding=Object.assign({},data.onboarding,D.onboarding);
  }

  // Guardar el estado actualizado en localStorage inmediatamente
  // para que si Firebase llega tarde en la próxima carga, tengamos los datos correctos
  try{lss('hist',serHist());lss('pesos',serPesos());lss('tallas',D.tallas||[]);lss('pcs',D.pcs||[]);lss('hitos',D.hitos);lss('meds',D.meds);lss('visits',serVisits());lss('notas',D.notas);lss('cartas',D.cartas);}catch(ex){}
  setDot('#64c8b4','Sincronizado');
  if(typeof applyNightMode==='function')applyNightMode();
  if(typeof render==='function')render();
  if(typeof buildMomentosQueue==='function'){
    setTimeout(function(){
      _momentosQueue = buildMomentosQueue();
      _momentoActual = 0;
      if(_momentosQueue.length > 0) showNextMomento();
      else updatePendBadge();
    }, 500);
  }
  // Chequear logros nuevos tras sincronización
  setTimeout(function(){
    if(typeof checkNuevosLogros==='function') checkNuevosLogros();
  }, 1200);
  setTimeout(function(){
    if(typeof checkAutoHitos==='function') checkAutoHitos();
  }, 2000);
  setTimeout(function(){
    if(typeof checkSintomasContextuales==='function') checkSintomasContextuales();
  }, 3500);
  // Onboarding contextual — una pregunta por sesión, 5s tras carga
  setTimeout(function(){
    if(typeof checkOnboardingContextual==='function') checkOnboardingContextual();
  }, 5000);
  // Nocturna Céfiro — sugerencia de cuento a partir de las 20hs
  setTimeout(function(){
    if(typeof checkNocturnaCuento==='function') checkNocturnaCuento();
  }, 6500);
},function(err){fbReady=true;setDot('#e07070','Error Firebase');console.error(err);});
</script>
